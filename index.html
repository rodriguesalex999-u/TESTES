<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Teste de Conexão Supabase</h1>
    <div id="resultado">Carregando...</div>

    <script>
        const SUPABASE_URL = 'https://vnrfmsyanrvqqhmqyixk.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_xGLDFQarl-DhshRW0932FQ_asug0TUK';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function testar() {
            const { data, error } = await supabase.from('products').select('id, name');
            
            if (error) {
                document.getElementById('resultado').innerHTML = 'ERRO: ' + error.message;
            } else {
                document.getElementById('resultado').innerHTML = '✅ CONECTADO! Produtos encontrados: ' + data.length;
                console.log('Produtos:', data);
            }
        }
        
        testar();
    </script>
</body>
</html>
