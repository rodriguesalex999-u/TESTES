<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste Supabase</title>
</head>
<body>
    <h1>Teste de Conexão Supabase</h1>
    <div id="resultado">Carregando...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Aguardar o script carregar
        window.addEventListener('load', function() {
            const SUPABASE_URL = 'https://vnrfmsyanrvqqhmqyixk.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_xGLDFQarl-DhshRW0932FQ_asug0TUK';
            
            // Verificar se supabase existe
            if (typeof supabase === 'undefined') {
                document.getElementById('resultado').innerHTML = '❌ ERRO: Supabase não carregou!';
                return;
            }
            
            const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            client.from('products').select('id, name').limit(5)
                .then(result => {
                    if (result.error) {
                        document.getElementById('resultado').innerHTML = '❌ ERRO: ' + result.error.message;
                    } else {
                        document.getElementById('resultado').innerHTML = '✅ CONECTADO! Produtos encontrados: ' + result.data.length + '<br><br>Produtos: ' + JSON.stringify(result.data);
                    }
                })
                .catch(err => {
                    document.getElementById('resultado').innerHTML = '❌ ERRO CATCH: ' + err.message;
                });
        });
    </script>
</body>
</html>
